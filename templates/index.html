<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة بخت الرضا الطبية</title>
    <!-- استيراد الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .header img { width: 60px; }
        .header h2 { color: #1a374d; margin: 10px 0; font-size: 1.5rem; }
        .sub-header { background: #1a374d; color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            resize: none;
            font-size: 1rem;
            box-sizing: border-box;
        }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .btn-analyze { background-color: #d32f2f; color: white; }
        .btn-camera { background-color: #2e7d32; color: white; }
        
        #result, #scanResult {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            text-align: right;
        }
        .error { color: #d32f2f; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png" alt="logo">
        <h2>مؤسسة بخت الرضا الطبية</h2>
    </div>

    <div class="sub-header">
        <i class="fas fa-stethoscope"></i> نظام الاستشارة الباطنية الذكي
    </div>

    <!-- إدخال النص -->
    <textarea id="symptoms" rows="4" placeholder="اكتب الأعراض التي تشعر بها هنا..."></textarea>

    <div class="btn-group">
        <button class="btn-analyze" onclick="analyzeSymptoms()">
            <i class="fas fa-bolt"></i> إرسال للتحليل الطبي
        </button>
        
        <!-- إدخال الكاميرا -->
        <input type="file" accept="image/*" capture="camera" id="imageUpload" style="display: none;" onchange="uploadImage()">
        <button class="btn-camera" onclick="document.getElementById('imageUpload').click()">
            <i class="fas fa-camera"></i> تصوير الروشتة أو الفحص
        </button>
    </div>

    <div id="loading" style="display:none; margin-top:10px;">جاري المعالجة...</div>
    <div class="error" id="errorMsg">فشل الاتصال بسيرفر المؤسسة.</div>
    
    <div id="result"></div>
    <div id="scanResult"></div>

    <div style="margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px;">
        <p style="font-size: 0.8rem; color: #666;">مركز بخت الرضا للتميز الطبي - الدويم</p>
    </div>
</div>

<script>
    // تحليل الأعراض النصية
    function analyzeSymptoms() {
        const symptoms = document.getElementById('symptoms').value;
        if(!symptoms) return alert("الرجاء إدخال الأعراض");

        fetch('/check', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symptoms: symptoms })
        })
        .then(res => res.json())
        .then(data => {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.style.background = '#e3f2fd';
            let html = '<strong>النتائج المتوقعة:</strong><br>';
            data.forEach(item => {
                html += `<p>• ${item.disease}<br><small>الفحوصات: ${item.tests}</small></p>`;
            });
            resultDiv.innerHTML = html;
            document.getElementById('errorMsg').style.display = 'none';
        })
        .catch(() => {
            document.getElementById('errorMsg').style.display = 'block';
        });
    }

    // رفع وتحليل صورة الروشتة
    function uploadImage() {
        const fileInput = document.getElementById('imageUpload');
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        document.getElementById('loading').style.display = 'block';

        fetch('/scan', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            const scanDiv = document.getElementById('scanResult');
            scanDiv.style.display = 'block';
            scanDiv.style.background = '#f1f8e9';
            scanDiv.innerHTML = `<strong>النص المكتشف في الروشتة:</strong><br><p dir="ltr">${data.extracted_text || 'لم نتمكن من قراءة النص'}</p>`;
        })
        .catch(() => {
            document.getElementById('loading').style.display = 'none';
            alert("حدث خطأ أثناء معالجة الصورة");
        });
    }
</script>

</body>
</html>
